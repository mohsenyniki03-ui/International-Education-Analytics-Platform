name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: sudo apt-get install -y librdkafka-dev
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install faker==24.4.0 confluent-kafka==2.3.0 pytest==8.1.1
      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint Python code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: |
          flake8 data-generator/ api/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --ignore=E501,W503

  dbt-validate:
    name: Validate dbt models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dbt
        run: pip install dbt-postgres==1.8.2
      - name: Validate dbt models compile
        run: |
          cd eduflow_dbt
          dbt compile --profiles-dir . --target dev
        env:
          DBT_PROFILES_DIR: .