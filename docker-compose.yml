# This file starts the entire local development environment with one command:
#   docker compose up
#
# Services start in dependency order:
#   1. Zookeeper  (Kafka's coordinator — must be healthy before Kafka starts)
#   2. Kafka      (the reliable event holder — must be healthy before generator starts)
#   3. Generator  (our Python producer — streams synthetic student events into Kafka)
#
# To stop and clean up everything:
#   docker compose down

volumes:
  postgres_data:
  localstack_data:

services:

  # ── 1. ZOOKEEPER ────────────────────────────────────────────────────────────
  # Kafka's coordination service. Keeps track of which brokers are alive,
  # where each partition lives, and who is the leader of each partition.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181   # the port Kafka will use to talk to Zookeeper
      ZOOKEEPER_TICK_TIME: 2000     # heartbeat interval in milliseconds
    ports:
      - "2181:2181"                 # expose so we can inspect Zookeeper from the host if needed
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/2181' && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 2. KAFKA ─────────────────────────────────────────────────────────────────
  # The reliable event holder. Receives events from the generator and holds
  # them in ordered, partitioned topics until downstream consumers are ready.
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy   # waits for Zookeeper to pass its healthcheck first
    ports:
      - "9092:9092"                 # exposes Kafka to the host machine (for local testing/CLI)
    environment:
      KAFKA_BROKER_ID: 1            # unique ID for this broker (matters in multi-broker clusters)
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181   # where to find Zookeeper
      # Two listeners: one for traffic inside Docker (PLAINTEXT), one for traffic
      # from your Mac host machine (PLAINTEXT_HOST). This split is necessary because
      # "kafka" resolves inside Docker's network but not on your Mac.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1     # 1 because we only have one broker locally
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"        # topics are created automatically on first use
      KAFKA_LOG_RETENTION_HOURS: 168                 # keep messages for 7 days locally
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── 3. GENERATOR ─────────────────────────────────────────────────────────────
  # Our synthetic data producer. Generates a population of fake international
  # students, simulates their lifecycle events, and publishes them to Kafka.
  # Runs in backfill mode: pushes all events as fast as possible so Kafka has
  # a full dataset for Airflow and Spark to process in Week 2.
  generator:
    build:
      context: ./data-generator      # build the image from our Dockerfile
    container_name: generator
    depends_on:
      kafka:
        condition: service_healthy   # waits for Kafka to pass its healthcheck first
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092   # uses the internal Docker network address
    command: [
      "--mode", "backfill",
      "--num-students", "2000",
      "--seed", "42",                # fixed seed = same population every run, good for dev
      "--bootstrap-servers", "kafka:29092"
    ]
  # ── 4. POSTGRESQL ────────────────────────────────────────────────────────────
  # Airflow's metadata database. Stores DAG run history, task states,
  # logs, and everything Airflow needs to remember between runs.
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  # ── 5. LOCALSTACK ────────────────────────────────────────────────────────────
  # Simulates AWS S3 locally so we don't incur cloud costs during development.
  # Airflow DAGs write raw events and curated Spark output here.
  localstack:
    image: localstack/localstack:3.4
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health | grep -q '\"s3\": \"available\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  
  # ── 6. AIRFLOW INIT ──────────────────────────────────────────────────────────
  # Runs once to initialize the Airflow database and create the admin user.
  # Exits after completion — not a long-running service.
  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    command: [
      "bash", "-c",
      "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    ]
  
  # ── 7. REDIS ─────────────────────────────────────────────────────────────────
  # Message broker between Airflow scheduler and worker.
  # Scheduler drops tasks here, worker picks them up.
  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ── 8. AIRFLOW WEBSERVER ─────────────────────────────────────────────────────
  # The browser UI. Open http://localhost:8080 to see DAGs and task runs.
  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: "confluent-kafka==2.3.0 pandas==2.2.2 pyarrow==16.0.0 boto3==1.34.0"
      AIRFLOW__WEBSERVER__SECRET_KEY: 'eduflow-secret-key-2026'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health | grep -q 'healthy' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  
  # ── 9. AIRFLOW SCHEDULER ─────────────────────────────────────────────────────
  # Watches the clock and triggers tasks in the right order.
  # Sends tasks to Redis where the worker picks them up.
  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: "confluent-kafka==2.3.0 pandas==2.2.2 pyarrow==16.0.0 boto3==1.34.0"
      AIRFLOW__WEBSERVER__SECRET_KEY: 'eduflow-secret-key-2026'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) | grep -q 'Found one alive job' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  
  # ── 10. AIRFLOW WORKER ───────────────────────────────────────────────────────
  # Executes the actual tasks the scheduler sends via Redis.
  airflow-worker:
    image: apache/airflow:2.9.1
    container_name: airflow-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: "confluent-kafka==2.3.0 pandas==2.2.2 pyarrow==16.0.0 boto3==1.34.0"
      AIRFLOW__WEBSERVER__SECRET_KEY: 'eduflow-secret-key-2026'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: celery worker
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.executors.celery_executor.app inspect ping | grep -q 'pong' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    
  